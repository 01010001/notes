---
- name: Export host metrics using remote hostnames
  hosts: all
  gather_facts: true
  tasks:
    - name: Calculate total disk size
      ansible.builtin.shell: df -h --total | awk 'END{print $2}'
      register: disk_size
      changed_when: false
 
    - name: Ensure CSV header exists
      ansible.builtin.lineinfile:
        path: ./host_inventory.csv
        line: "Hostname,IP_Address,OS_Version,Disk_Size,CPU_Count,Memory_MB"
        create: true
        insertbefore: BOF
      run_once: true
      delegate_to: localhost
 
    - name: Append data row
      ansible.builtin.lineinfile:
        path: ./host_inventory.csv
        line: "{{ ansible_hostname }},{{ ansible_default_ipv4.address }},{{ ansible_distribution }} {{ ansible_distribution_version }},{{ disk_size.stdout }},{{ ansible_processor_vcpus }},{{ ansible_memtotal_mb }}"
        create: true
      delegate_to: localhost