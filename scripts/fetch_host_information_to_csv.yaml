---
- name: Export host metrics using remote hostnames
  hosts: all
  gather_facts: true
  tasks:

    - name: Total physical disk size
      shell: |
        lsblk -d -b -o SIZE | tail -n +2 | awk '{total += $1} END {printf "%.2f GB", total/1024/1024/1024}'
      register: toplam_disk
      changed_when: false

    - name: Ensure CSV header exists
      ansible.builtin.lineinfile:
        path: ./host_inventory.csv
        line: "Hostname,IP_Address,OS_Version,Kernel_Version,Disk_Size,CPU_Count,Memory_MB"
        create: true
        insertbefore: BOF
      run_once: true
      delegate_to: localhost

    - name: Append data row
      ansible.builtin.lineinfile:
        path: ./host_inventory.csv
        line: "{{ ansible_hostname }},{{ ansible_default_ipv4.address }},{{ ansible_distribution }} {{ ansible_distribution_version }},{{ ansible_kernel }},{{ toplam_disk.stdout }},{{ ansible_processor_vcpus }},{{ ansible_memtotal_mb }}"
        create: true
      delegate_to: localhost